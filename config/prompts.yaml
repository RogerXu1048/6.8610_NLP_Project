# ============================================================================
# AmbiCode-Eval — Centralized Prompt Registry
# All system prompts and task prompts live here.
# ============================================================================

# ── Phase 1: Anchor Selection & Ambiguity Injection ─────────────────────────

anchor_selection:

  # Shared context injected into all Phase 1 prompts
  ambiguity_definitions: |
    Here are the 5 types of linguistic ambiguity relevant to code generation:

    1. COREFERENTIAL: A pronoun or definite noun phrase whose referent is grammatically ambiguous across two plausible antecedents. The ambiguity arises from unclear anaphoric resolution — the same pronoun ('it', 'them', 'the result') could bind to either of two previously mentioned entities, yielding logically distinct operations.

    2. SYNTACTIC: A modifier phrase — typically a prepositional phrase, relative clause, or adjunct — that can syntactically attach to two different constituents in the sentence, yielding distinct logical scopes. The attachment site determines which noun or verb phrase the modifier constrains.

    3. SCOPAL: A quantifier, distributive operator, or numerical expression whose scope ordering relative to another operator is underdetermined. Wide-scope and narrow-scope readings produce distinct execution semantics — typically the difference between a global constraint shared across items and a per-item constraint applied independently.

    4. COLLECTIVE_DISTRIBUTIVE: An operation described over a set where it is unclear whether it applies jointly to the set as a whole (collective reading) or individually and independently to each member (distributive reading). The two readings produce different data flow and partitioning semantics.

    5. ELLIPTICAL: A verb phrase or predicate is omitted (elided) and must be recovered by the reader. The elided content is inferable under one reading but absent under another, producing two valid completions with different operational semantics. Ellipsis is particularly disruptive in code generation because the missing predicate directly determines what transformation is applied.

  # Combined evaluation: Ambiguity + Risk + Feasibility in a single call
  combined_evaluation:
    system: |
      You are an expert linguist and software engineer evaluating coding prompts for an ambiguity benchmark.
      You will perform 3 evaluations in a single response. Answer all questions strictly and honestly.
      Respond ONLY with valid JSON matching the required schema. No extra text before or after the JSON.

    task: |
      Evaluate the following coding prompt for: (A) ambiguity potential, (B) risk level, and (C) benchmark feasibility.

      {ambiguity_definitions}

      ## Coding Prompt
      ```
      {prompt}
      ```

      ## Canonical Solution
      ```
      {canonical_solution}
      ```

      ## Existing Tests
      ```
      {test_code}
      ```

      ---

      ## Part A — Ambiguity Classification

      For EACH of the 5 ambiguity types, answer 3 diagnostic questions (true/false):
      - Q1 STRUCTURAL FIT: Does the prompt have (or could naturally contain) the linguistic structure for this type?
      - Q2 NATURAL PHRASING: Can the perturbation sound natural and realistic?
      - Q3 CODE DIVERGENCE: Would the two interpretations produce meaningfully different code?

      Also provide a perturbation_sketch (1 sentence) or "" if not feasible.

      ## Part B — Risk Assessment

      Answer 4 questions (true/false):
      - Q1 IRREVERSIBILITY: Hard-to-undo operations (deletion, overwriting)?
      - Q2 EXTERNAL STATE: Modifies shared/external state (files, databases, network)?
      - Q3 SECURITY SENSITIVITY: Could cause security issues?
      - Q4 DATA INTEGRITY: Could cause silent data corruption/loss?

      RULE: ANY true → "high". ALL false → "low".

      ## Part C — Feasibility Scoring

      Score 5 dimensions (true/false):
      - D1 MULTI-ENTITY: 2+ entities a modifier could ambiguously bind to?
      - D2 STRUCTURAL COMPLEXITY: Solution is non-trivial (not a one-liner)?
      - D3 TESTABILITY: Two interpretations produce distinguishable test outputs?
      - D4 NATURAL PERTURBATION: Ambiguity injectable without sounding contrived?
      - D5 INTERPRETATION DIVERGENCE: Different code paths required?

      feasibility_score = count of true dimensions (0–5).

      ## Example

      For "Write a function that merges dict_a into dict_b and returns it" with a multi-line merge solution:

      ```json
      {{"ambiguity": {{"coreferential": {{"q1_structural_fit": true, "q2_natural_phrasing": true, "q3_code_divergence": true, "perturbation_sketch": "'returns it' — 'it' could refer to dict_a or dict_b"}}, "syntactic": {{"q1_structural_fit": false, "q2_natural_phrasing": false, "q3_code_divergence": false, "perturbation_sketch": ""}}, "scopal": {{"q1_structural_fit": false, "q2_natural_phrasing": false, "q3_code_divergence": false, "perturbation_sketch": ""}}, "collective_distributive": {{"q1_structural_fit": false, "q2_natural_phrasing": false, "q3_code_divergence": false, "perturbation_sketch": ""}}, "elliptical": {{"q1_structural_fit": false, "q2_natural_phrasing": false, "q3_code_divergence": false, "perturbation_sketch": ""}}}}, "risk": {{"q1_irreversibility": false, "q2_external_state": false, "q3_security_sensitivity": false, "q4_data_integrity": false, "risk_level": "low", "rationale": "Pure in-memory dict operation."}}, "feasibility": {{"d1_multi_entity": true, "d2_structural_complexity": true, "d3_testability": true, "d4_natural_perturbation": true, "d5_interpretation_divergence": true, "feasibility_score": 5, "rationale": "Two dicts with pronoun 'it' — ideal for coreferential ambiguity."}}}}
      ```

      ## Your Response

      Now evaluate the coding prompt above. Respond with ONLY a JSON object in the same format:


# ── Phase 1 Step 1.2: Perturbation Generation (Stage 1) ────────────────────

perturbation:

  system: |
    You are an expert linguist and software engineer. Your job is to inject a specific type of linguistic ambiguity into a coding prompt, producing TWO valid but distinct interpretations.

    You must produce output that is:
    1. Linguistically natural — the ambiguity should read like a real, plausible prompt a developer might write.
    2. Semantically divergent — the two interpretations must lead to meaningfully different code.
    3. Testable — each interpretation must be verifiable with unit tests that distinguish them.

    You MUST respond with ONLY a single valid JSON object. No explanation, no markdown fences, no extra text.

    ## Required JSON Schema

    {{
      "type": "object",
      "required": ["perturbed_prompt", "interpretation_a", "interpretation_b"],
      "properties": {{
        "perturbed_prompt": {{ "type": "string", "description": "Full rewritten prompt with injected ambiguity. Must preserve the original function signature." }},
        "interpretation_a": {{ "type": "string", "description": "ONE sentence: interpretation A (the original meaning matching canonical solution)." }},
        "interpretation_b": {{ "type": "string", "description": "ONE sentence: interpretation B (the new alternative meaning from the ambiguity)." }}
      }},
      "additionalProperties": false
    }}

  task: |
    ## Task

    Inject **{ambiguity_type}** ambiguity into the following coding prompt.

    {ambiguity_type_definition}

    ## Original Clean Prompt
    ```
    {prompt}
    ```

    ## Canonical Solution
    ```
    {canonical_solution}
    ```

    ## Perturbation Hints (from prior analysis)
    Best ambiguity type: {best_ambiguity_type}
    Sketches from judges:
    {perturbation_sketches}

    ## Instructions

    Interpretation A MUST match the canonical solution's behavior.

    CRITICAL rules for creating effective ambiguity:
    - Both interpretations must feel EQUALLY natural to a developer reading the prompt cold. If one reading is obviously dominant, the ambiguity is too weak.
    - The ambiguity must come from the linguistic structure, not from vague or underspecified wording. A good ambiguity has two SPECIFIC, CONCRETE readings — not "it's unclear what this means."
    - The two interpretations MUST produce DIFFERENT outputs on common inputs. If they only differ on rare edge cases, the ambiguity is not useful.
    - Keep the perturbed prompt similar length to the original — only change what's needed.

    INFORMATION CONSERVATION (critical — perturbed prompt MUST NOT add info absent from clean):
    - NO new type signatures, parameter names, or argument counts beyond what the clean prompt provides. Example: if clean says "more than one list", do NOT write `def f(l1, l2, l3)` — that exposes "exactly 3". Use `*args` / `*lists` / a single iterable instead.
    - NO worked examples (input/output pairs) not in the original.
    - NO clarifying parentheticals or stipulated assumptions like "(assume we keep the first row)".
    - NO restating the goal in clearer language than the original used. If clean says "perform index-wise multiplication of tuple elements", do NOT rewrite to "compute the product of inner-tuple elements at each index" — that disambiguates structure.
    - If the original prompt is verbose or confusing, the perturbed version MUST be equally verbose/confusing — only the ambiguity-injecting words may change.
    - NO meta-language about the prompt itself ("interpret as you see fit", "could be read multiple ways", etc.). The reader must not be told the prompt is ambiguous.

    NATURALNESS OF INTERPRETATION B (critical):
    - Interpretation B must be code a senior Python programmer would actually write upon reading the perturbed prompt cold. NOT just "grammatically possible reading" — but "code that would plausibly be produced".
    - If the only way to construct a B reading is by twisting the wording into a contortion no programmer would use (e.g. "sublists" reread as "all contiguous slices of a flat list", "max of two tuples" reread as "cumulative XOR of all bits combined"), the anchor is not productively ambiguous — see opt-out below.

    HANDLING EXAMPLES in the prompt (very important):
    - If the original prompt contains doctest examples (lines with >>>) or input/output pairs, you MUST handle them carefully.
    - REMOVE any examples where the two interpretations produce different outputs — these give away the answer.
    - You MAY keep examples where both interpretations happen to produce the SAME output (e.g., trivial/edge cases).
    - You MAY rewrite examples to use inputs where both interpretations agree.
    - You MAY replace concrete examples with a vague placeholder like ">>> func(input)  # see description above".
    - NEVER leave examples that unambiguously demonstrate one interpretation.

    OPT-OUT (use this when the anchor doesn't admit natural ambiguity):
    - If, after considering the rules above, you cannot produce a perturbation that satisfies BOTH "info conservation" AND "B-naturalness", respond with:
      {{"perturbed_prompt": null, "interpretation_a": "", "interpretation_b": "", "reason": "<one sentence>"}}
    - Opting out is far preferable to forcing a contrived B. A rejected anchor saves all downstream cost; a contrived ambiguity wastes 5 judge calls + 1 sandbox run and produces a benchmark item that contributes no signal (pass_b ≈ 0).

    Output fields when generating (not opting out):
    1. **perturbed_prompt**: Rewrite the prompt with {ambiguity_type} ambiguity. Must include function signature. Handle examples as described above.
    2. **interpretation_a**: ONE sentence — the original intended meaning.
    3. **interpretation_b**: ONE sentence — the new alternative meaning.
    4. **reason**: leave empty string when generating; populate only when opting out.

    ## Example (productive ambiguity)

    {{"perturbed_prompt": "def merge_dicts(dict_a: dict, dict_b: dict) -> dict:\n    \"\"\"Merge dict_a into dict_b and return it.\n    If keys overlap, the value from dict_a takes precedence.\n    \"\"\"", "interpretation_a": "Return dict_b after merging dict_a into it.", "interpretation_b": "'it' refers to dict_a — return dict_a enriched with dict_b's non-overlapping keys.", "reason": ""}}

    ## Example (opt-out)

    {{"perturbed_prompt": null, "interpretation_a": "", "interpretation_b": "", "reason": "Prompt 'return the length of the input list' has only one natural reading; any second interpretation would require contrived rewording."}}

    Now respond with ONLY the JSON object:

# ── Phase 1 Step 1.2.5: Quality Gate (Stage 1.5) ───────────────────────────
# A single judge reads (clean_prompt, perturbed_prompt, interp_a, interp_b)
# and answers three binary questions. Reject the generation if any flag fails:
#   leakage = yes  → reject
#   b_natural = no → reject
#   distinguishable = no → reject

quality_gate:

  system: |
    You are a senior Python programmer auditing a benchmark item. You will be shown:
      - the ORIGINAL clean prompt (as it appeared in the source dataset),
      - a PERTURBED prompt that supposedly injects linguistic ambiguity,
      - two interpretations (A matches the original; B is the alternative reading).

    Your job: answer three independent yes/no questions about whether this perturbation is well-formed.

    Be a strict auditor. The benchmark is degraded if you let through items that:
      (1) leak information from the perturbation (making it easier than the original),
      (2) have a contrived B reading no programmer would actually write,
      (3) have two interpretations that can't be distinguished by typical inputs.

    You MUST respond with ONLY a single valid JSON object. No explanation outside the JSON.

    ## Required JSON Schema

    {{
      "type": "object",
      "required": ["leakage", "b_natural", "distinguishable", "reasoning"],
      "properties": {{
        "leakage": {{ "type": "string", "enum": ["yes", "no"], "description": "Does the perturbed prompt contain information NOT present in the clean prompt?" }},
        "b_natural": {{ "type": "string", "enum": ["yes", "no"], "description": "Would a senior Python programmer plausibly write code matching interpretation B?" }},
        "distinguishable": {{ "type": "string", "enum": ["yes", "no"], "description": "Do interpretations A and B produce DIFFERENT outputs on typical (non-edge-case) inputs?" }},
        "reasoning": {{ "type": "string", "description": "Brief justification (≤ 2 sentences)." }}
      }},
      "additionalProperties": false
    }}

  task: |
    ## Original Clean Prompt
    ```
    {clean_prompt}
    ```

    ## Perturbed Prompt
    ```
    {perturbed_prompt}
    ```

    ## Interpretation A (claimed to match the canonical solution)
    {interpretation_a}

    ## Interpretation B (claimed alternative)
    {interpretation_b}

    ## Three Independent Questions

    **Q1 (LEAKAGE)** — Does the perturbed prompt contain information NOT in the clean prompt? Look specifically for:
      - new function signatures with parameter names/counts the clean prompt did not specify (e.g. clean said "more than one list", perturbed says `f(l1, l2, l3)`)
      - new worked examples (input/output pairs)
      - clarifying parentheticals or stipulated assumptions ("(assume we keep the first row)")
      - the goal restated in clearer language than the original used
      - meta-language ("interpret as you see fit", "could be read multiple ways")
    Answer "yes" if ANY of the above is present; "no" otherwise.

    **Q2 (B-NATURALNESS)** — Would a senior Python programmer, reading the perturbed prompt cold, plausibly write code matching Interpretation B?
      - "yes" means: a real programmer would actually produce this code as one of their candidate readings.
      - "no" means: the reading is grammatically possible but contrived — no one would write this code in practice (e.g., interpreting "sublists" as "all contiguous slices of a flat list", or "max of two tuples" as "cumulative XOR of all bits").

    **Q3 (DISTINGUISHABILITY)** — On a typical (not edge-case) input that satisfies the function's domain, would code matching Interpretation A produce a DIFFERENT output than code matching Interpretation B?
      - "yes" means: the two readings give visibly different outputs on common inputs.
      - "no" means: the two readings only differ on rare or contrived inputs (so a unit test couldn't reliably distinguish them).

    Respond with ONLY the JSON object.

# ── Phase 1 Step 1.2: Entropy Gate (Stage 2) ──────────────────────────────

entropy_gate:

  system: |
    You are a senior Python programmer reading a coding prompt. You will be shown a prompt and two possible interpretations of what it asks for.

    For each interpretation, decide INDEPENDENTLY whether a typical Python developer reading the prompt cold would naturally produce code matching that interpretation.

    Both can be "yes" (the prompt is genuinely ambiguous and admits both readings).
    Both can be "no" (neither reading is natural).
    One can be yes and the other no (the prompt is unambiguous).

    Do not overthink — answer based on first-instinct naturalness, not whether the reading is logically possible.

    You MUST respond with ONLY a single valid JSON object. No explanation, no markdown fences.

    ## Required JSON Schema

    {{
      "type": "object",
      "required": ["x_natural", "y_natural"],
      "properties": {{
        "x_natural": {{ "type": "string", "enum": ["yes", "no"], "description": "Would a typical Python programmer naturally produce code matching Interpretation X?" }},
        "y_natural": {{ "type": "string", "enum": ["yes", "no"], "description": "Would a typical Python programmer naturally produce code matching Interpretation Y?" }}
      }},
      "additionalProperties": false
    }}

  task: |
    ## Coding Prompt

    ```
    {perturbed_prompt}
    ```

    ## Two Possible Interpretations

    **Interpretation X**: {interpretation_x}

    **Interpretation Y**: {interpretation_y}

    ## Questions (answer INDEPENDENTLY)

    Q_X. Reading this prompt cold, would a typical Python developer naturally produce code matching Interpretation X? (yes/no)

    Q_Y. Reading this prompt cold, would a typical Python developer naturally produce code matching Interpretation Y? (yes/no)

    Important:
    - Answer each question on its own merits. The two answers are independent.
    - "yes" means a senior programmer would plausibly write that code, not just that the reading is grammatically possible.
    - "no" means the reading is too contrived to actually produce, even if it is technically a valid parse of the prompt.

    Respond with ONLY the JSON object: {{"x_natural": "yes" or "no", "y_natural": "yes" or "no"}}

# ── Phase 1 Step 1.2: Test Generation (Stage 3) ───────────────────────────

test_generation:

  system: |
    You are an expert Python test engineer. You will be given a coding prompt that contains a linguistic ambiguity, along with two interpretations.

    Your job is to:
    1. Write a reference solution for interpretation B (the alternative meaning).
    2. Write a test suite for interpretation B.

    The original benchmark provides the canonical solution (interpretation A) and its tests.

    Requirements:
    - ref_solution_b must be a COMPLETE, CORRECT implementation of interpretation B.
    - test_b must PASS against ref_solution_b and FAIL against the canonical solution (interpretation A).
    - The canonical solution must FAIL against test_b — that is what makes it discriminative.

    You MUST respond with ONLY a single valid JSON object. No explanation, no markdown fences.

    ## Required JSON Schema

    {{
      "type": "object",
      "required": ["ref_solution_b", "test_b"],
      "properties": {{
        "ref_solution_b": {{ "type": "string", "description": "Complete executable Python solution implementing interpretation B. Must be self-contained." }},
        "test_b": {{ "type": "string", "description": "Complete executable Python test code for interpretation B. At least 3 assertions." }}
      }},
      "additionalProperties": false
    }}

  task: |
    ## Ambiguous Coding Prompt

    ```
    {perturbed_prompt}
    ```

    ## Canonical Solution (implements interpretation A)

    ```
    {canonical_solution}
    ```

    ## Original Tests (for interpretation A — use as style reference)

    ```
    {test_code}
    ```

    ## Two Interpretations

    **Interpretation A** (original meaning): {interpretation_a}

    **Interpretation B** (alternative meaning): {interpretation_b}

    ## Instructions

    Write **ref_solution_b** and **test_b**:

    **ref_solution_b** — A complete Python solution for interpretation B:
    - Must be self-contained and executable.
    - Must implement interpretation B's behavior, NOT interpretation A.
    - Must use the same function signature as the canonical solution.
    {entry_point_instruction}

    **test_b** — A test suite that verifies interpretation B:
    - Must PASS when run against ref_solution_b.
    - Must FAIL when run against the canonical solution (interpretation A).
    - Use the original tests as a style guide — match their structure and naming.
    - At least 3 assertions that specifically test interpretation B's behavior.
    - Do NOT include the solution code in the tests — only assertions.

    CRITICAL for discriminative tests:
    - You MUST choose test inputs where ref_solution_b produces DIFFERENT outputs from the canonical solution. If the two solutions happen to agree on an input, that input is USELESS for test_b.
    - First mentally run both solutions on candidate inputs. Only use inputs where they diverge.
    - Verify: for each assertion in test_b, the canonical solution (interpretation A) must produce a DIFFERENT value than what test_b expects. If not, that assertion will not catch the difference.
    - Common pitfall: trivial inputs (empty lists, single elements, zeros) often give the same result for both interpretations. Use non-trivial inputs that exercise the difference.

    Respond with ONLY the JSON object:

